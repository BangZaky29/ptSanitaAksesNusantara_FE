name: Build and Deploy FE

on:
  push:
    branches:
      - main  # Pastikan ini nama branch utama lu

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Update ke v4 biar up-to-date

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Update ke v4
        with:
          node-version: '22' # Pakai Node 22 agar tidak kena warning deprecated

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: |
          CI=false npm run build # Ditambahkan CI=false agar build tidak gagal karena unused variable
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_OFFICE_WHATSAPP: ${{ secrets.VITE_OFFICE_WHATSAPP }}
          VITE_PHONE_SANDI: ${{ secrets.VITE_PHONE_SANDI }}
          VITE_PHONE_FRADIYA: ${{ secrets.VITE_PHONE_FRADIYA }}
          VITE_PHONE_YUANITA: ${{ secrets.VITE_PHONE_YUANITA }}
          VITE_PHONE_DARUS: ${{ secrets.VITE_PHONE_DARUS }}

      - name: Deploy via Secure HTTPS POST
        run: |
          cd dist
          zip -r ../deploy.zip .
          cd ..
          curl -X POST \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN || 'sanita_akses_nusantara_deploy_2026' }}" \
            -F "file=@deploy.zip" \
            https://sanitaaksesnusantara.com/deploy.php