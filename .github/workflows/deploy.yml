name: Build and Deploy FE

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./  # Root repo sudah di folder FE jika push dari sini

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: CI=false npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_OFFICE_WHATSAPP: ${{ secrets.VITE_OFFICE_WHATSAPP }}
          VITE_PHONE_SANDI: ${{ secrets.VITE_PHONE_SANDI }}
          VITE_PHONE_FRADIYA: ${{ secrets.VITE_PHONE_FRADIYA }}
          VITE_PHONE_YUANITA: ${{ secrets.VITE_PHONE_YUANITA }}
          VITE_PHONE_DARUS: ${{ secrets.VITE_PHONE_DARUS }}

      - name: Verify Build Output
        run: |
          echo "=== Isi folder dist/ ==="
          ls -la dist/
          echo "=== Cek index.html ada ==="
          test -f dist/index.html && echo "index.html OK" || (echo "ERROR: index.html tidak ada!" && exit 1)

      - name: Zip Build Output
        run: |
          cd dist
          zip -r ../deploy.zip .
          cd ..
          echo "=== Ukuran zip ==="
          ls -lh deploy.zip

      - name: Deploy via Secure HTTPS POST to cPanel
        run: |
          echo "=== Mulai deploy ke sanitaaksesnusantara.com ==="
          RESPONSE=$(curl --silent --show-error \
            --max-time 120 \
            -w "\n%{http_code}" \
            -X POST \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -F "file=@deploy.zip" \
            https://sanitaaksesnusantara.com/deploy.php)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response Body: $BODY"

          # Pastikan response adalah JSON bukan HTML (cek apakah deploy.php dieksekusi)
          if echo "$BODY" | grep -q "<!doctype html\|<html"; then
            echo "❌ Deploy GAGAL! Server mengembalikan HTML bukan JSON."
            echo "   Kemungkinan penyebab:"
            echo "   1. File deploy.php belum ada di public_html/ cPanel"
            echo "   2. .htaccess redirect ke index.html"
            echo "   Solusi: Upload deploy.php ke public_html/ cPanel secara manual."
            exit 1
          fi

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Deploy GAGAL! HTTP Code: $HTTP_CODE"
            exit 1
          fi

          # Cek JSON response success field
          if echo "$BODY" | grep -q '"success":true'; then
            echo "✅ Deploy BERHASIL! Website sudah diperbarui."
          else
            echo "❌ Deploy GAGAL! Response tidak mengandung success:true"
            echo "Response: $BODY"
            exit 1
          fi